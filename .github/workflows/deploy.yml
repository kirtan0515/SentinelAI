name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: "Docker image tag to deploy (commit SHA or 'latest')"
        required: true
        default: "latest"
      skip_smoke_tests:
        description: "Skip smoke tests after deployment"
        required: false
        type: boolean
        default: false

env:
  AWS_REGION: "us-east-1"
  ECR_BACKEND_REPO: "sentinelai-backend"
  ECR_FRONTEND_REPO: "sentinelai-frontend"

jobs:
  # ===========================================================================
  # Pre-deployment validation
  # ===========================================================================
  validate:
    name: Validate Images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.resolve-tag.outputs.tag }}
      cluster: ${{ steps.env-config.outputs.cluster }}
      backend_service: ${{ steps.env-config.outputs.backend_service }}
      frontend_service: ${{ steps.env-config.outputs.frontend_service }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure environment
        id: env-config
        run: |
          ENV="${{ inputs.environment }}"
          echo "cluster=sentinelai-${ENV}" >> $GITHUB_OUTPUT
          echo "backend_service=sentinelai-${ENV}-backend" >> $GITHUB_OUTPUT
          echo "frontend_service=sentinelai-${ENV}-frontend" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.environment == 'production' && secrets.AWS_PROD_ROLE_ARN || secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve and validate image tag
        id: resolve-tag
        run: |
          TAG="${{ inputs.image_tag }}"
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"

          # Verify backend image exists
          aws ecr describe-images \
            --repository-name ${{ env.ECR_BACKEND_REPO }} \
            --image-ids imageTag=$TAG \
            --region ${{ env.AWS_REGION }} || {
              echo "::error::Backend image with tag $TAG not found in ECR"
              exit 1
            }

          # Verify frontend image exists
          aws ecr describe-images \
            --repository-name ${{ env.ECR_FRONTEND_REPO }} \
            --image-ids imageTag=$TAG \
            --region ${{ env.AWS_REGION }} || {
              echo "::error::Frontend image with tag $TAG not found in ECR"
              exit 1
            }

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "✅ Images validated: backend:$TAG and frontend:$TAG"

  # ===========================================================================
  # Deploy
  # ===========================================================================
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: [validate]
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.environment == 'production' && secrets.AWS_PROD_ROLE_ARN || secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Save current task definitions (for rollback)
        id: current
        run: |
          CLUSTER="${{ needs.validate.outputs.cluster }}"
          BACKEND="${{ needs.validate.outputs.backend_service }}"
          FRONTEND="${{ needs.validate.outputs.frontend_service }}"

          BACKEND_TD=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$BACKEND" \
            --query 'services[0].taskDefinition' \
            --output text)
          FRONTEND_TD=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$FRONTEND" \
            --query 'services[0].taskDefinition' \
            --output text)

          echo "backend_td=$BACKEND_TD" >> $GITHUB_OUTPUT
          echo "frontend_td=$FRONTEND_TD" >> $GITHUB_OUTPUT
          echo "Saved current task definitions for rollback"

      - name: Update backend task definition
        id: backend-td
        run: |
          TAG="${{ needs.validate.outputs.image_tag }}"
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          BACKEND="${{ needs.validate.outputs.backend_service }}"
          NEW_IMAGE="$REGISTRY/${{ env.ECR_BACKEND_REPO }}:$TAG"

          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$BACKEND" \
            --query 'taskDefinition' --output json)

          NEW_TASK_DEF=$(echo $TASK_DEF | jq \
            --arg IMAGE "$NEW_IMAGE" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          NEW_TD_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "td_arn=$NEW_TD_ARN" >> $GITHUB_OUTPUT

      - name: Update frontend task definition
        id: frontend-td
        run: |
          TAG="${{ needs.validate.outputs.image_tag }}"
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          FRONTEND="${{ needs.validate.outputs.frontend_service }}"
          NEW_IMAGE="$REGISTRY/${{ env.ECR_FRONTEND_REPO }}:$TAG"

          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$FRONTEND" \
            --query 'taskDefinition' --output json)

          NEW_TASK_DEF=$(echo $TASK_DEF | jq \
            --arg IMAGE "$NEW_IMAGE" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          NEW_TD_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "td_arn=$NEW_TD_ARN" >> $GITHUB_OUTPUT

      - name: Deploy services
        run: |
          CLUSTER="${{ needs.validate.outputs.cluster }}"
          BACKEND="${{ needs.validate.outputs.backend_service }}"
          FRONTEND="${{ needs.validate.outputs.frontend_service }}"

          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$BACKEND" \
            --task-definition ${{ steps.backend-td.outputs.td_arn }} \
            --region ${{ env.AWS_REGION }}

          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$FRONTEND" \
            --task-definition ${{ steps.frontend-td.outputs.td_arn }} \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment stability
        id: wait
        run: |
          CLUSTER="${{ needs.validate.outputs.cluster }}"
          BACKEND="${{ needs.validate.outputs.backend_service }}"
          FRONTEND="${{ needs.validate.outputs.frontend_service }}"

          echo "Waiting for services to stabilize..."
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$BACKEND" "$FRONTEND" \
            --region ${{ env.AWS_REGION }}
          echo "✅ Services stabilized"

      - name: Run smoke tests
        if: ${{ !inputs.skip_smoke_tests }}
        id: smoke
        run: |
          DEPLOY_URL="${{ secrets.DEPLOY_URL }}"
          if [[ -z "$DEPLOY_URL" ]]; then
            echo "⚠️ DEPLOY_URL not configured, skipping smoke tests"
            exit 0
          fi

          echo "Running smoke tests against $DEPLOY_URL"
          curl -sf "$DEPLOY_URL/health" || exit 1
          echo "✅ Health check passed"
          curl -sf "$DEPLOY_URL/api/v1/health" || exit 1
          echo "✅ API health check passed"

      - name: Rollback on failure
        if: failure() && (steps.wait.outcome == 'failure' || steps.smoke.outcome == 'failure')
        run: |
          CLUSTER="${{ needs.validate.outputs.cluster }}"
          BACKEND="${{ needs.validate.outputs.backend_service }}"
          FRONTEND="${{ needs.validate.outputs.frontend_service }}"

          echo "🚨 Deployment failed! Rolling back..."

          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$BACKEND" \
            --task-definition ${{ steps.current.outputs.backend_td }} \
            --region ${{ env.AWS_REGION }}

          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$FRONTEND" \
            --task-definition ${{ steps.current.outputs.frontend_td }} \
            --region ${{ env.AWS_REGION }}

          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$BACKEND" "$FRONTEND" \
            --region ${{ env.AWS_REGION }}

          echo "✅ Rollback complete"
          exit 1

  # ===========================================================================
  # Notifications
  # ===========================================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [validate, deploy]
    if: always()
    steps:
      - name: Notify success
        if: needs.deploy.result == 'success'
        run: |
          echo "🎉 Deployment to ${{ inputs.environment }} successful!"
          echo "Image tag: ${{ needs.validate.outputs.image_tag }}"
          echo "Deployed by: ${{ github.actor }}"
          echo "Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"

      - name: Notify failure
        if: needs.deploy.result == 'failure'
        run: |
          echo "🚨 Deployment to ${{ inputs.environment }} FAILED!"
          echo "Image tag: ${{ needs.validate.outputs.image_tag }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Check logs for details."

      - name: Slack notification (success)
        if: needs.deploy.result == 'success' && secrets.SLACK_WEBHOOK_URL != ''
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            -d '{
              "text": "✅ SentinelAI deployed to ${{ inputs.environment }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *SentinelAI* deployed to *${{ inputs.environment }}*\n• Tag: `${{ needs.validate.outputs.image_tag }}`\n• By: ${{ github.actor }}\n• <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }'

      - name: Slack notification (failure)
        if: needs.deploy.result == 'failure' && secrets.SLACK_WEBHOOK_URL != ''
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            -d '{
              "text": "🚨 SentinelAI deployment to ${{ inputs.environment }} FAILED",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚨 *SentinelAI* deployment to *${{ inputs.environment }}* FAILED\n• Tag: `${{ needs.validate.outputs.image_tag }}`\n• By: ${{ github.actor }}\n• <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }'
