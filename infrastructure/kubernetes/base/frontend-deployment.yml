apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinelai-frontend
  namespace: sentinelai
  labels:
    app: sentinelai
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentinelai
      component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: sentinelai
        component: frontend
    spec:
      containers:
        - name: frontend
          image: sentinelai-frontend:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: sentinelai-config
                  key: NEXT_PUBLIC_API_URL
            - name: NEXT_PUBLIC_APP_NAME
              value: "SentinelAI"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
