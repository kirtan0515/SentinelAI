apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sentinelai-postgres
  namespace: sentinelai
  labels:
    app: sentinelai
    component: postgres
spec:
  serviceName: sentinelai-postgres
  replicas: 1
  selector:
    matchLabels:
      app: sentinelai
      component: postgres
  template:
    metadata:
      labels:
        app: sentinelai
        component: postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: sentinelai
            - name: POSTGRES_USER
              value: sentinelai
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinelai-secrets
                  key: POSTGRES_PASSWORD
                  optional: true
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - sentinelai
                - -d
                - sentinelai
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - sentinelai
                - -d
                - sentinelai
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: postgres-init
          configMap:
            name: postgres-init-scripts
            optional: true
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          app: sentinelai
          component: postgres
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: standard
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: sentinelai-postgres
  namespace: sentinelai
  labels:
    app: sentinelai
    component: postgres
spec:
  type: ClusterIP
  selector:
    app: sentinelai
    component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
