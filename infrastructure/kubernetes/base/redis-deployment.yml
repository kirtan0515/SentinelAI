apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinelai-redis
  namespace: sentinelai
  labels:
    app: sentinelai
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentinelai
      component: redis
  template:
    metadata:
      labels:
        app: sentinelai
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          args:
            - "--maxmemory"
            - "256mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
            - "--appendonly"
            - "yes"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          emptyDir:
            sizeLimit: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sentinelai-redis
  namespace: sentinelai
  labels:
    app: sentinelai
    component: redis
spec:
  type: ClusterIP
  selector:
    app: sentinelai
    component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
