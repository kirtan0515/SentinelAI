apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sentinelai

resources:
  - ../../base/namespace.yml
  - ../../base/configmap.yml
  - ../../base/secrets.yml
  - ../../base/backend-deployment.yml
  - ../../base/backend-service.yml
  - ../../base/frontend-deployment.yml
  - ../../base/frontend-service.yml
  - ../../base/redis-deployment.yml
  - ../../base/postgres-statefulset.yml
  - ../../base/ingress.yml
  - ../../base/hpa.yml

# Prod-specific patches
patches:
  # Backend: 3 replicas, higher resources
  - target:
      kind: Deployment
      name: sentinelai-backend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"

  # Frontend: 3 replicas, higher resources
  - target:
      kind: Deployment
      name: sentinelai-frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"

  # Postgres: production resources and storage
  - target:
      kind: StatefulSet
      name: sentinelai-postgres
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "4Gi"

  # Redis: production resources
  - target:
      kind: Deployment
      name: sentinelai-redis
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"

  # HPA: higher thresholds for prod
  - target:
      kind: HorizontalPodAutoscaler
      name: sentinelai-backend-hpa
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 20

# Prod ConfigMap overrides
configMapGenerator:
  - name: sentinelai-config
    behavior: merge
    literals:
      - APP_ENV=production
      - DEBUG=false
      - CORS_ORIGINS=https://sentinelai.example.com
      - RATE_LIMIT_PER_MINUTE=60
      - RATE_LIMIT_PER_HOUR=1000

commonLabels:
  environment: production
