apiVersion: v1
kind: Service
metadata:
  name: sentinelai-frontend
  namespace: sentinelai
  labels:
    app: sentinelai
    component: frontend
spec:
  type: ClusterIP
  selector:
    app: sentinelai
    component: frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
