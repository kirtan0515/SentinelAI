apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinelai-backend
  namespace: sentinelai
  labels:
    app: sentinelai
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentinelai
      component: backend
  template:
    metadata:
      labels:
        app: sentinelai
        component: backend
    spec:
      containers:
        - name: backend
          image: sentinelai-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: sentinelai-secrets
            - configMapRef:
                name: sentinelai-config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
