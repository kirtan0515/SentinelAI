line-length = 100

[lint]
select = ["E", "F", "W"]
ignore = [
    "E501",  # line too long
    "E712",  # == True (required by SQLAlchemy filter syntax)
    "F401",  # unused imports
    "F821",  # forward references in type annotations
    "F841",  # unused variable (health check return values)
    "W291",  # trailing whitespace in multiline strings
]

[lint.per-file-ignores]
"tests/**" = ["E", "F", "W"]
"alembic/**" = ["E", "F", "W"]
"__init__.py" = ["F401"]
