apiVersion: v1
kind: ConfigMap
metadata:
  name: sentinelai-config
  namespace: sentinelai
  labels:
    app: sentinelai
data:
  APP_ENV: "production"
  APP_NAME: "SentinelAI"
  BACKEND_HOST: "0.0.0.0"
  BACKEND_PORT: "8000"
  CORS_ORIGINS: "https://sentinelai.example.com"
  RATE_LIMIT_PER_MINUTE: "60"
  RATE_LIMIT_PER_HOUR: "1000"
  OLLAMA_HOST: "http://ollama:11434"
  OLLAMA_MODEL: "llama2"
  NEXT_PUBLIC_API_URL: "https://sentinelai.example.com/api/v1"
  NEXT_PUBLIC_APP_NAME: "SentinelAI"
  JWT_ALGORITHM: "HS256"
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
  DEBUG: "false"
